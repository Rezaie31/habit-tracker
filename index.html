<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Daily Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f3ede2;
    --paper-2: #fbf8f2;
    --ink: #262019;
    --muted: #8a7d63;
    --moss: #4f6b45;
    --amber: #c98a2c;
    --line: rgba(38,32,25,0.14);
    --shadow: 0 10px 24px rgba(38,32,25,0.10);
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background:
      radial-gradient(circle at 1px 1px, rgba(38,32,25,0.05) 1px, transparent 0) 0 0/22px 22px,
      var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .wrap{ max-width: 880px; margin: 0 auto; padding: 56px 24px 80px; }

  header{ display:flex; justify-content:space-between; align-items:flex-end; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; border-bottom: 1px solid var(--line); padding-bottom: 24px; }
  header .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  header h1{ font-family:'Fraunces', serif; font-weight: 600; font-size: 42px; margin:0; letter-spacing: -0.01em; }
  header .sub{ color: var(--muted); font-size: 14px; max-width: 340px; text-align:right; }

  form.add-row{ display:flex; gap: 12px; margin-bottom: 36px; }
  .add-row input{
    flex:1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    font-family: 'Fraunces', serif;
    font-size: 20px;
    padding: 8px 2px;
    color: var(--ink);
    outline: none;
  }
  .add-row input::placeholder{ color: var(--muted); font-style: italic; }
  .add-row button{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper-2);
    border: none;
    padding: 0 22px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.25s, transform 0.2s;
  }
  .add-row button:hover{ background: var(--moss); transform: translateY(-1px); }

  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 22px; }

  .card{
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px 20px 18px;
    box-shadow: var(--shadow);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:nth-child(3n+1){ transform: rotate(-0.6deg); }
  .card:nth-child(3n+2){ transform: rotate(0.5deg); }
  .card:nth-child(3n){ transform: rotate(-0.3deg); }
  .card:hover{ transform: rotate(0deg) translateY(-3px); box-shadow: 0 16px 30px rgba(38,32,25,0.14); }

  .card-head{ display:flex; justify-content:space-between; align-items:flex-start; gap: 8px; margin-bottom: 14px; }
  .card-head h3{ font-family:'Fraunces', serif; font-weight: 600; font-size: 19px; margin:0; line-height: 1.25; }
  .icon-btn{
    background:none; border:none; color: var(--muted); font-size: 20px; line-height:1;
    cursor:pointer; padding: 2px 6px; border-radius: 3px; transition: color 0.2s, background 0.2s;
  }
  .icon-btn:hover{ color:#a13c2c; background: rgba(161,60,44,0.08); }

  .tally-block{ display:flex; align-items:center; gap: 10px; margin-bottom: 16px; min-height: 36px; }
  .tally-row{ display:flex; gap: 6px; }
  .tally-group line{ stroke: var(--ink); stroke-width: 2.2; stroke-linecap: round; }
  .tally-group .tally-strike{ stroke: var(--amber); }
  .tally-empty{ font-family:'IBM Plex Mono', monospace; color: var(--muted); font-size: 13px; }
  .streak-label{ font-family:'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); }

  .week-row{ display:flex; gap: 6px; justify-content: space-between; }
  .day-dot{
    flex:1; aspect-ratio: 1/1; border-radius: 50%;
    border: 1px solid var(--line); background: transparent;
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
    cursor: pointer; transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
  }
  .day-dot:hover{ transform: scale(1.08); }
  .day-dot.done{ background: var(--moss); border-color: var(--moss); color: var(--paper-2); }
  .day-dot.today{ box-shadow: 0 0 0 2px var(--amber); }

  .empty{
    text-align:center; padding: 60px 20px; color: var(--muted);
    font-family:'Fraunces', serif; font-size: 18px; font-style: italic;
    border: 1px dashed var(--line); border-radius: 6px;
  }

  footer{ margin-top: 56px; text-align:center; font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }

  @media (max-width: 520px){
    header{ flex-direction: column; align-items: flex-start; }
    header .sub{ text-align:left; }
    header h1{ font-size: 32px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const STORAGE_KEY = "ledger.habits.v1";

function toKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function computeStreak(habit) {
  let streak = 0;
  let d = new Date();
  if (!habit.completions[toKey(d)]) {
    d.setDate(d.getDate() - 1);
  }
  while (habit.completions[toKey(d)]) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function getLast7(habit) {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = toKey(d);
    days.push({
      key,
      label: d.toLocaleDateString("en-US", { weekday: "narrow" }),
      done: !!habit.completions[key],
      isToday: i === 0,
    });
  }
  return days;
}

function TallyGroup({ lines, strike }) {
  const xs = [6, 13, 20, 27];
  const visible = xs.slice(0, Math.min(lines, 4));
  return (
    <svg className="tally-group" viewBox="0 0 34 36" width="30" height="32">
      {visible.map((x, i) => (
        <line key={i} x1={x} y1="4" x2={x} y2="32" />
      ))}
      {lines > 4 && strike && <line x1="2" y1="30" x2="32" y2="6" className="tally-strike" />}
    </svg>
  );
}

function Tally({ count }) {
  if (count === 0) return <span className="tally-empty">no streak yet</span>;
  const groups = Math.floor(count / 5);
  const remainder = count % 5;
  const items = [];
  for (let i = 0; i < groups; i++) items.push({ lines: 5, strike: true });
  if (remainder > 0) items.push({ lines: remainder, strike: false });
  return (
    <div className="tally-row">
      {items.map((g, i) => (
        <TallyGroup key={i} {...g} />
      ))}
    </div>
  );
}

function HabitCard({ habit, onToggleDay, onDelete }) {
  const streak = computeStreak(habit);
  const days = getLast7(habit);
  return (
    <div className="card">
      <div className="card-head">
        <h3>{habit.name}</h3>
        <button className="icon-btn" onClick={() => onDelete(habit.id)} aria-label="Delete habit">
          ×
        </button>
      </div>
      <div className="tally-block">
        <Tally count={streak} />
        <span className="streak-label">
          {streak} day{streak !== 1 ? "s" : ""} running
        </span>
      </div>
      <div className="week-row">
        {days.map((d) => (
          <button
            key={d.key}
            className={"day-dot" + (d.done ? " done" : "") + (d.isToday ? " today" : "")}
            onClick={() => onToggleDay(habit.id, d.key)}
            aria-label={d.key}
          >
            {d.label}
          </button>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [habits, setHabits] = useState([]);
  const [name, setName] = useState("");

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) setHabits(JSON.parse(saved));
    } catch (e) {
      console.error("Could not load habits", e);
    }
  }, []);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
  }, [habits]);

  function addHabit(e) {
    e.preventDefault();
    const trimmed = name.trim();
    if (!trimmed) return;
    const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
    setHabits((prev) => [...prev, { id, name: trimmed, completions: {} }]);
    setName("");
  }

  function toggleDay(habitId, dayKey) {
    setHabits((prev) =>
      prev.map((h) =>
        h.id === habitId
          ? { ...h, completions: { ...h.completions, [dayKey]: !h.completions[dayKey] } }
          : h
      )
    );
  }

  function deleteHabit(id) {
    setHabits((prev) => prev.filter((h) => h.id !== id));
  }

  return (
    <div className="wrap">
      <header>
        <div>
          <div className="eyebrow">Field Notes</div>
          <h1>Ledger</h1>
        </div>
        <p className="sub">A small daily record. Mark the day, watch the tally grow.</p>
      </header>

      <form className="add-row" onSubmit={addHabit}>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="Name a new habit — read, stretch, journal…"
        />
        <button type="submit">Add</button>
      </form>

      {habits.length === 0 ? (
        <div className="empty">Nothing logged yet. Add a habit above to start your first tally.</div>
      ) : (
        <div className="grid">
          {habits.map((h) => (
            <HabitCard key={h.id} habit={h} onToggleDay={toggleDay} onDelete={deleteHabit} />
          ))}
        </div>
      )}

      <footer>Stored locally in your browser · no account needed</footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
